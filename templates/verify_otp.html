<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Verificar código — ZELO</title>
 <meta name="theme-color" content="#1F1F24">
 <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
 <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}">
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="background:var(--bg);">

<div class="login-wrap">
 <div class="login-card">
  <h1 class="login-title" style="font-family:'Playfair Display',serif;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;">Zelo</h1>
  <p class="login-subtitle">Verificar código</p>
  <p style="font-size:.8125rem;color:var(--text-muted);text-align:center;margin-bottom:1.25rem;">
   Informe seu e-mail e o código de 6 dígitos enviado após a aprovação do líder.
  </p>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
  <div class="alert alert-{{ category }}" style="margin-bottom:1rem;">
   <span>{{ message }}</span>
   <button class="alert-close" onclick="this.parentElement.remove()">×</button>
  </div>
  {% endfor %}
  {% endwith %}

  <form method="POST">
   <div class="form-group">
    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" placeholder="seu@email.com"
     required autofocus value="{{ email }}">
   </div>

   <div class="form-group">
    <label for="code">Código</label>
    <input type="text" id="code" name="code" placeholder="000000"
     inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
     autocomplete="one-time-code" required
     style="font-size:1.5rem;letter-spacing:.4em;text-align:center;">
   </div>

   <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem;">
    Verificar
   </button>
  </form>

  <p style="text-align:center;margin-top:1rem;font-size:.875rem;">
   <a href="{{ url_for('login') }}" style="color:var(--text-muted);">Já tenho senha — fazer login</a>
  </p>
 </div>
</div>

<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
