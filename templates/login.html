<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Entrar — ZELO</title>
 <meta name="theme-color" content="#1F1F24">
 <meta name="apple-mobile-web-app-capable" content="yes">
 <meta name="apple-mobile-web-app-title" content="ZELO">
 <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
 <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}">
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="background: var(--bg);">

<div class="login-wrap">
 <div class="login-card">
 <h1 class="login-title" style="font-family:'Playfair Display',serif;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;">Zelo</h1>
 <p style="font-size:.8125rem;color:var(--text-muted);text-align:center;font-style:italic;margin-bottom:.25rem;">Zelo é o cuidado e a preocupação com algo</p>
 <p class="login-subtitle">Faça login para continuar</p>

 {% with messages = get_flashed_messages(with_categories=true) %}
 {% for category, message in messages %}
 <div class="alert alert-{{ category }}" style="margin-bottom:1rem;">
 <span>{{ message }}</span>
 <button class="alert-close" onclick="this.parentElement.remove()">×</button>
 </div>
 {% endfor %}
 {% endwith %}

 <form method="POST" action="{{ url_for('login') }}">
 <div class="form-group">
 <label for="email">E-mail</label>
 <input
 type="email"
 id="email"
 name="email"
 placeholder="seu@email.com"
 required
 autofocus
 value="{{ request.form.get('email', '') }}"
 >
 </div>

 <div class="form-group">
 <label for="password">Senha</label>
 <input
 type="password"
 id="password"
 name="password"
 placeholder="••••••••"
 required
 >
 </div>

 <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem;">
 Entrar
 </button>
 </form>

 <p style="text-align:center;margin-top:1rem;font-size:.875rem;">
  <a href="{{ url_for('first_access') }}" style="color:var(--accent);font-weight:600;">Primeiro acesso</a>
 </p>
 <p style="text-align:center;margin-top:.5rem;font-size:.875rem;">
  <a href="{{ url_for('forgot_password') }}" style="color:var(--text-muted);">Esqueci minha senha</a>
 </p>
 </div>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
