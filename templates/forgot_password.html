<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esqueci a senha — ZELO</title>
  <meta name="theme-color" content="#1F1F24">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <h1 class="login-title" style="font-family:'Playfair Display',serif;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;">Zelo</h1>
    <p class="login-subtitle">Informe seu e-mail para receber o link de redefinição</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
      <div class="alert alert-{{ category }}" style="margin-bottom:1rem;">
        <span>{{ message }}</span>
        <button class="alert-close" onclick="this.parentElement.remove()">×</button>
      </div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email"
               placeholder="seu@email.com" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary"
              style="width:100%;justify-content:center;margin-top:.5rem;">
        Enviar link
      </button>
    </form>

    <p style="text-align:center;margin-top:1rem;font-size:.875rem;">
      <a href="{{ url_for('login') }}" style="color:var(--text-muted);">← Voltar ao login</a>
    </p>
  </div>
</div>

</body>
</html>
