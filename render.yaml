services:
  - type: web
    name: escalas-ministerios
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: escalas-db
          property: connectionString

databases:
  - name: escalas-db
    databaseName: escalas
    user: escalas
    plan: free
